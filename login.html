<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오딘 보스 스케줄 - 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Odin Boss Schedule</h1>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">계정에 로그인하세요</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>

            <div class="form-group"
                style="display: flex; gap: 15px; flex-direction: row; align-items: center; justify-content: flex-start; margin-top: 5px; margin-bottom: 20px;">
                <label
                    style="display: flex; align-items: center; gap: 6px; font-weight: normal; cursor: pointer; color: var(--text-muted); font-size: 14px;">
                    <input type="checkbox" id="saveId"
                        style="width: 16px; height: 16px; margin: 0; accent-color: var(--primary-color);"> 아이디 저장
                </label>
                <label
                    style="display: flex; align-items: center; gap: 6px; font-weight: normal; cursor: pointer; color: var(--text-muted); font-size: 14px;">
                    <input type="checkbox" id="autoLogin"
                        style="width: 16px; height: 16px; margin: 0; accent-color: var(--primary-color);" checked> 자동
                    로그인
                </label>
            </div>

            <button type="submit" class="auth-btn">로그인</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const savedUsername = localStorage.getItem('savedUsername');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('saveId').checked = true;
            }

            // Check if already logged in
            if (localStorage.getItem('token') || sessionStorage.getItem('token')) {
                window.location.href = 'menu.html';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    const saveId = document.getElementById('saveId').checked;
                    const autoLogin = document.getElementById('autoLogin').checked;

                    if (saveId) {
                        localStorage.setItem('savedUsername', username);
                    } else {
                        localStorage.removeItem('savedUsername');
                    }

                    const storage = autoLogin ? localStorage : sessionStorage;
                    storage.setItem('token', data.token);
                    storage.setItem('role', data.role);
                    storage.setItem('username', data.username);
                    storage.setItem('userId', data.userId);
                    if (data.nickname) storage.setItem('nickname', data.nickname);

                    window.location.href = 'menu.html';
                } else {
                    errorDiv.textContent = data.error || '로그인에 실패했습니다.';
                }
            } catch (err) {
                errorDiv.textContent = '서버 통신 오류가 발생했습니다.';
            }
        });
    </script>
</body>

</html>
