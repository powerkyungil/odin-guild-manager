<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오딘 길드 보스 스케줄</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    if (!localStorage.getItem('token') && !sessionStorage.getItem('token')) {
      window.location.href = 'login.html';
    }
  </script>
</head>

<body>

  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title-group">
          <a href="menu.html" style="display: inline-flex; align-items: center; gap: 4px; color: var(--primary-color); text-decoration: none; font-size: 12px; font-weight: 600; margin-bottom: 8px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            메뉴로 돌아가기
          </a>
          <h2>보스 입력 (공유됨)</h2>
        </div>
        <button id="sidebar-close" class="close-btn" aria-label="Close Sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>



      <div class="sidebar-content" id="form-container" style="padding-top: 0;">
        <!-- Accordion items injected via JS -->
      </div>



      <div class="sidebar-footer">
        <button id="apply-all-btn" class="primary-btn">전체 적용하기</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="wrap">
        <section class="hero">
          <div>
            <h1 id="main-guild-title">보스 스케줄</h1>
            <div class="sub">공유 스케줄 · 최근 지난 보스 2개 표시 · 자동 동기화</div>
          </div>
          <div class="stats" id="stats-container">
            <div class="stat">전체 0건</div>
            <div class="stat">본섭 0건</div>
            <div class="stat">침공 0건</div>
          </div>
        </section>

        <!-- New Main Clock Section -->
        <div class="main-clock-container">
          <div class="main-clock-label">현재 서버 시간</div>
          <div id="current-time-display" class="main-clock-time">--:--:--</div>
        </div>

        <section class="card">
          <div class="toolbar">
            <div class="toolbar-left">
              <div class="chip">실시간 동기화 중...</div>
              <div class="voice-control-group" style="display: flex; align-items: center; gap: 8px; margin-left: 12px;">
                <button id="voice-test-btn" class="action-btn" title="음성 테스트" style="padding: 4px 8px; font-size: 11px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                  음성 테스트
                </button>
                <div class="voice-toggle-wrapper" style="display: flex; align-items: center; gap: 4px;">
                  <label class="switch" style="position: relative; display: inline-block; width: 34px; height: 18px;">
                    <input type="checkbox" id="voice-toggle" checked style="opacity: 0; width: 0; height: 0;">
                    <span class="slider round" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px;"></span>
                  </label>
                  <span style="font-size: 11px; color: var(--text-muted); font-weight: 600;">웹 음성 알림</span>
                </div>
              </div>
            </div>
            
            <div class="toolbar-actions" style="display: flex; gap: 10px;">
              <button id="clear-btn" class="action-btn danger-action">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                전체 초기화
              </button>
              
              <button id="refresh-btn" class="action-btn primary-action">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                동기화
              </button>
            </div>
          </div>

          <div class="list" id="schedule-container">
            <!-- Dynamically populated by app.js -->
            <div class="empty-state">
              데이터를 불러오는 중...
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- Toggle Button for Sidebar -->
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Participant List Modal -->
  <div id="participantModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; align-content: center; backdrop-filter: blur(4px);">
    <div class="modal-content" style="background: #1e293b; border-radius: 16px; width: 90%; max-width: 400px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
      <div class="modal-header" style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: rgba(255,255,255,0.02);">
        <div>
          <h2 id="participantModalTitle" style="margin: 0; font-size: 18px; font-weight: 800; color: #fff;">보스명 참여 목록</h2>
          <div id="participantCount" style="margin-top: 4px; font-size: 13px; color: var(--main); font-weight: 600;">총 0명</div>
        </div>
        <button onclick="document.getElementById('participantModal').style.display='none'" style="background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 24px; padding: 4px; border-radius: 8px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="participantListContainer" style="padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 15px; color: #e2e8f0; font-weight: 600;">
        <!-- Participants injected here -->
      </div>
    </div>
  </div>

  <script src="app.js?v=5"></script>
</body>

</html>
